version: '3'
services:
  app:
    build: .
    ports:
      - 3000:3000
    volumes:
      - .:/app
    working_dir: /app
    command: node index.js
    restart: always
  db:
    image: mysql:8.0
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mydb
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data:
